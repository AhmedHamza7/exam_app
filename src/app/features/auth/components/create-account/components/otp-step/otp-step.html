<div class="otp-step">
  <h3 class="otp-subtitle">Verify OTP</h3>

  <p class="otp-desc">
    Please enter the 6-digits code we have sent to:
    <span class="otp-email-row">
      <span class="otp-email">{{ email() }}</span>
      <button type="button" class="otp-edit" (click)="onEdit()">Edit</button>
    </span>
  </p>

  <div class="otp-input-wrap">
    <p-inputotp [(ngModel)]="value" [length]="6" name="otp" />
  </div>

  @if (validationFailed()) {
    <p-message severity="error" icon="pi pi-times-circle" styleClass="mb-2">{{
      errorMessage()
    }}</p-message>
  }

  @if (countdownSeconds() > 0) {
    <p class="otp-resend">
      You can request another code in: {{ countdownSeconds() }}s
    </p>
  } @else {
    <div class="otp-resend-row">
      <button
        type="button"
        class="otp-resend-link"
        [disabled]="resendLoading()"
        (click)="onResend()"
      >
        Request another code
      </button>
    </div>
  }

  <div class="otp-actions">
    <p-button
      variant="outlined"
      label="Verify code"
      styleClass="w-full"
      [disabled]="loading() || (value?.length ?? 0) !== 6"
      [loading]="loading()"
      (onClick)="onVerify()"
    />
  </div>
</div>
