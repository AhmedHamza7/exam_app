<section class="reset-password-page">
  <div class="reset-password-card">
    <div class="reset-password">
      <h2 class="title">Create a New Password</h2>
      <p class="desc">Create a new strong password for your account.</p>

      <div class="field-group">
        <label for="newPassword">
          New Password <span class="req">*</span>
        </label>
        <p-password
          inputId="newPassword"
          [(ngModel)]="newPassword"
          name="newPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full"
          placeholder="New password"
        />
      </div>

      <div class="field-group">
        <label for="confirmNewPassword">
          Confirm New Password <span class="req">*</span>
        </label>
        <p-password
          inputId="confirmNewPassword"
          [(ngModel)]="confirmNewPassword"
          name="confirmNewPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full"
          placeholder="Confirm new password"
        />
      </div>

      <div class="actions">
        <p-button
          label="Reset password"
          styleClass="w-full"
          (onClick)="onResetPassword()"
        />
      </div>

      <p class="create-account-text">
        Don&rsquo;t have an account? <a routerLink="/create-account">Create yours</a>
      </p>
    </div>
  </div>
</section>
